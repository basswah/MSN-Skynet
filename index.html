<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Skynet - إنترنت بلا حدود. سرعات فائقة، تغطية واسعة، أسعار منافسة." />
    <title>Skynet | إنترنت بلا حدود</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;600;700&family=Tajawal:wght@400;500;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />
    <script>
      (function () {
        var theme = null
        try {
          var stored = localStorage.getItem('skynet-theme')
          if (stored) {
            var parsed = JSON.parse(stored)
            if (parsed && typeof parsed.state === 'object' && parsed.state !== null) {
              theme = parsed.state.isDarkMode
            }
          }
        } catch (e) {}
        if (theme === null) {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches
        }
        if (theme) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
